    const { useState, useEffect, useRef } = React;

// ─── DESIGN TOKENS ───
const T = {

  primaryLight: "#2A8BAA",
  primaryDark: "#0F4F68",
  primarySoft: "#E8F4F8",
  accent: "#E8734A",
  accentSoft: "#FFF0EB",
  success: "#2D9E6E",
  successSoft: "#E6F7EF",
  warning: "#D4890B",
  warningSoft: "#FFF8E8",
  danger: "#C43D3D",
  dangerSoft: "#FDE8E8",
  bg: "#F7F8FA",
  card: "#FFFFFF",
  border: "#E2E6EC",
  borderLight: "#F0F2F5",
  text: "#1A2332",
  textSecondary: "#5A6578",
  textMuted: "#8F99A8",
  font: "'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif",
  xs: 4, sm: 8, md: 12, lg: 16, xl: 24, xxl: 32,
  r: 12, rLg: 16, rXl: 24, rFull: 9999,

// ─── ICONS ───

    pill: <svg {...p}><rect x="7" y="3" width="10" height="18" rx="2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>,
    home: <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>,
    users: <svg {...p}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,

    clock: <svg {...p}><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>,
    alert: <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    camera: <svg {...p}><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>,

    search: <svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    plus: <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    scan: <svg {...p}><path d="M7 3H5a2 2 0 00-2 2v2m14-4h2a2 2 0 012 2v2M3 17v2a2 2 0 002 2h2m10 0h2a2 2 0 002-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>,
    settings: <svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33"/></svg>,
    star: <svg {...p}><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>,
    download: <svg {...p}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    layout: <svg {...p}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
    activity: <svg {...p}><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>,
    mail: <svg {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
    lock: <svg {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
    eye: <svg {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    phone: <svg {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
    globe: <svg {...p}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>,
    zap: <svg {...p}><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>,
    heart: <svg {...p}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
    clipboard: <svg {...p}><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
    barChart: <svg {...p}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
    arrowRight: <svg {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>,
    logIn: <svg {...p}><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>,
    calendar: <svg {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    package: <svg {...p}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27,6.96 12,12.01 20.73,6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
    truck: <svg {...p}><rect x="1" y="3" width="15" height="13"/><polygon points="16,8 20,8 23,11 23,16 16,16 16,8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
    userPlus: <svg {...p}><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>,
    x: <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    edit: <svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    moon: <svg {...p}><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,
    helpCircle: <svg {...p}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    logOut: <svg {...p}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    toggleRight: <svg {...p}><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="16" cy="12" r="3"/></svg>,
    toggleLeft: <svg {...p}><rect x="1" y="5" width="22" height="14" rx="7" ry="7"/><circle cx="8" cy="12" r="3"/></svg>,
    droplet: <svg {...p}><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>,
    thermometer: <svg {...p}><path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/></svg>,
    fileText: <svg {...p}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>,
    image: <svg {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>,
  };
  return icons[name] || null;
};

// ─── SHARED COMPONENTS ───
const Badge = ({ text, color = T.primary, bg = T.primarySoft, small }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: small ? "1px 6px" : "2px 10px", borderRadius: T.rFull, fontSize: small ? 9 : 11, fontWeight: 600, letterSpacing: 0.3, color, background: bg }}>{text}</span>
);

const Phone = ({ children }) => (
  <div style={{ width: 375, minHeight: 720, background: "#000", borderRadius: 44, padding: 12, boxShadow: "0 32px 100px rgba(0,0,0,0.2), 0 8px 32px rgba(0,0,0,0.15)", flexShrink: 0 }}>
    <div style={{ background: T.bg, borderRadius: 34, minHeight: 696, overflow: "hidden", display: "flex", flexDirection: "column", position: "relative" }}>
      <div style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 160, height: 30, background: "#000", borderRadius: "0 0 22px 22px", zIndex: 10 }} />
      <div style={{ height: 48, display: "flex", alignItems: "flex-end", justifyContent: "space-between", padding: "0 28px 4px", fontSize: 13, fontWeight: 600, color: T.text }}>
        <span>9:41</span><span style={{ fontSize: 10, letterSpacing: 1 }}>●●● ▐█▌ 84%</span>
      </div>
      {children}
      <div style={{ padding: "8px 0 6px", display: "flex", justifyContent: "center" }}>
        <div style={{ width: 134, height: 5, background: T.text, borderRadius: 3, opacity: 0.15 }} />
      </div>
    </div>
  </div>
);

const BottomNav = ({ active = "medpass" }) => (
  <div style={{ display: "flex", background: T.card, borderTop: `1px solid ${T.border}`, padding: "6px 0 0" }}>
    {[
      { id: "medpass", icon: "pill", label: "Med Pass" },
      { id: "residents", icon: "users", label: "Residents" },
      { id: "scan", icon: "scan", label: "Scan" },
      { id: "notes", icon: "file", label: "Docs" },
      { id: "alerts", icon: "bell", label: "Alerts" },
    ].map((item) => (
      <div key={item.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "6px 0", cursor: "pointer" }}>
        {item.id === "scan" ? (
          <div style={{ width: 40, height: 40, borderRadius: "50%", background: `linear-gradient(135deg, ${T.primary}, ${T.accent})`, display: "flex", alignItems: "center", justifyContent: "center", marginTop: -16, boxShadow: `0 4px 14px ${T.primary}44` }}>
            <I name="scan" size={20} color="#fff" />
          </div>
        ) : (
          <><I name={item.icon} size={20} color={active === item.id ? T.primary : T.textMuted} /><span style={{ fontSize: 10, fontWeight: active === item.id ? 700 : 500, color: active === item.id ? T.primary : T.textMuted }}>{item.label}</span></>
        )}
      </div>
    ))}
  </div>
);

const Header = ({ title, subtitle, onBack }) => (
  <div style={{ padding: "8px 16px", background: T.card, borderBottom: `1px solid ${T.border}`, display: "flex", alignItems: "center", gap: 10 }}>
    {onBack && <div onClick={onBack} style={{ width: 34, height: 34, borderRadius: 10, background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><I name="back" size={18} color={T.text} /></div>}
    <div><div style={{ fontSize: 17, fontWeight: 700, color: T.text }}>{title}</div>{subtitle && <div style={{ fontSize: 11, color: T.textSecondary }}>{subtitle}</div>}</div>
  </div>
);

const InputField = ({ label, placeholder, icon, type }) => (
  <div>
    <div style={{ fontSize: 12, fontWeight: 600, color: T.textSecondary, marginBottom: 4 }}>{label}</div>
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px", borderRadius: T.r, border: `1.5px solid ${T.border}`, background: T.bg }}>
      {icon && <I name={icon} size={16} color={T.textMuted} />}
      <span style={{ fontSize: 14, color: T.textMuted }}>{placeholder}</span>
    </div>
  </div>
);

const Btn = ({ children, secondary, small, onClick }) => (
  <div onClick={onClick} style={{ padding: small ? "10px 16px" : "14px", borderRadius: T.rLg, background: secondary ? T.card : `linear-gradient(135deg, ${T.primary}, ${T.primaryLight})`, color: secondary ? T.primary : "#fff", textAlign: "center", fontSize: small ? 13 : 15, fontWeight: 700, cursor: "pointer", border: secondary ? `1.5px solid ${T.primary}33` : "none" }}>{children}</div>
);

// ──────────────────────────────────────────
// SCREEN 1: MED PASS FLOW
// ──────────────────────────────────────────
const MedPassScreen = () => {
  const [screen, setScreen] = useState("queue");
  const [checked, setChecked] = useState({});
  const allChecked = Object.keys(checked).length === 4 && Object.values(checked).every(Boolean);
  const residents = [
    { name: "Dorothy M.", time: "8:00 AM", meds: 4, avatar: "DM", urgency: "overdue" },
    { name: "Robert K.", time: "8:00 AM", meds: 3, avatar: "RK", urgency: "now" },
    { name: "Helen W.", time: "8:00 AM", meds: 5, avatar: "HW", urgency: "now" },
    { name: "James T.", time: "8:30 AM", meds: 2, avatar: "JT", urgency: "soon" },
    { name: "Patricia L.", time: "9:00 AM", meds: 6, avatar: "PL", urgency: "later" },
    { name: "George A.", time: "9:00 AM", meds: 3, avatar: "GA", urgency: "done" },
  ];
  const uc = { overdue: { bg: T.dangerSoft, c: T.danger, l: "OVERDUE" }, now: { bg: T.accentSoft, c: T.accent, l: "DUE NOW" }, soon: { bg: T.warningSoft, c: T.warning, l: "8:30 AM" }, later: { bg: T.primarySoft, c: T.primary, l: "9:00 AM" }, done: { bg: T.successSoft, c: T.success, l: "DONE ✓" } };
  const meds = [
    { name: "Lisinopril", dose: "10mg", route: "Oral", freq: "Daily", color: "#4A90D9" },
    { name: "Metformin", dose: "500mg", route: "Oral", freq: "2x daily", color: "#D4890B" },
    { name: "Amlodipine", dose: "5mg", route: "Oral", freq: "Daily", color: "#2D9E6E" },
    { name: "Omeprazole", dose: "20mg", route: "Oral", freq: "Daily", color: "#8B5CF6" },
  ];

  if (screen === "confirm") return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: T.card }}>
      <div style={{ width: 72, height: 72, borderRadius: "50%", background: T.successSoft, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}><I name="check" size={36} color={T.success} /></div>
      <div style={{ fontSize: 20, fontWeight: 700, color: T.text, marginBottom: 4 }}>Med Pass Complete</div>
      <div style={{ fontSize: 14, color: T.textSecondary, marginBottom: 2 }}>Dorothy M. · 4 medications</div>
      <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 16 }}>Recorded at 8:03 AM by Caregiver Maria</div>
      <Badge text="Total time: 47 seconds" color={T.success} bg={T.successSoft} />
      <div onClick={() => { setScreen("queue"); setChecked({}); }} style={{ marginTop: 24 }}><Btn>Next Resident →</Btn></div>
    </div>
  );
  if (screen === "active") return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Header title="Dorothy M." subtitle="4 medications · 8:00 AM" onBack={() => setScreen("queue")} />
      <div style={{ margin: "8px 16px", padding: "8px 12px", background: T.dangerSoft, borderRadius: T.r, border: `1px solid ${T.danger}33`, display: "flex", alignItems: "center", gap: 8 }}>
        <I name="alert" size={14} color={T.danger} /><span style={{ fontSize: 12, fontWeight: 600, color: T.danger }}>⚠ Allergy: Penicillin, Sulfa</span>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 16px 16px" }}>
        {meds.map((m, i) => (
          <div key={i} onClick={() => setChecked(p => ({ ...p, [i]: !p[i] }))} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", marginBottom: 8, background: T.card, borderRadius: T.r, border: `1.5px solid ${checked[i] ? T.success : T.border}`, cursor: "pointer" }}>
            <div style={{ width: 6, height: 36, borderRadius: 3, background: m.color, flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, color: checked[i] ? T.success : T.text, textDecoration: checked[i] ? "line-through" : "none" }}>{m.name}</div>
              <div style={{ fontSize: 12, color: T.textSecondary }}>{m.dose} · {m.route} · {m.freq}</div>
